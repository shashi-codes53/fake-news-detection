<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 16px;
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: #1e1e2e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px;
      font-size: 13px;
      resize: none;
      outline: none;
    }

    textarea:focus { border-color: #a78bfa; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    #analyzeBtn  { background: #a78bfa; color: #0f0f1a; }
    #grabPageBtn { background: #1e1e2e; color: #a78bfa; border: 1px solid #a78bfa; }

    #result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 10px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity:1; transform:translateY(0); } }

    .result-fake   { background: #2d1b1b; border: 1px solid #ef4444; }
    .result-real   { background: #1b2d1b; border: 1px solid #22c55e; }
    .result-unsure { background: #2d2b1b; border: 1px solid #f59e0b; }

    .result-label {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .fake-color  { color: #ef4444; }
    .real-color  { color: #22c55e; }
    .unsure-color{ color: #f59e0b; }

    .confidence-bar-wrap {
      background: #333;
      border-radius: 999px;
      height: 8px;
      margin: 8px 0;
      overflow: hidden;
    }

    .confidence-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }

    .bar-fake  { background: #ef4444; }
    .bar-real  { background: #22c55e; }
    .bar-unsure{ background: #f59e0b; }

    .result-message { font-size: 12px; color: #aaa; margin-top: 6px; line-height: 1.5; }

    .loading {
      margin-top: 14px;
      text-align: center;
      color: #a78bfa;
      font-size: 13px;
      display: none;
    }

    .error-box {
      margin-top: 14px;
      padding: 10px;
      background: #2d1b1b;
      border: 1px solid #ef4444;
      border-radius: 8px;
      font-size: 12px;
      color: #ef4444;
      display: none;
    }

    .footer {
      margin-top: 14px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

<h2>🔍 Fake News Detector</h2>

<textarea id="newsText" placeholder="Paste a news headline or article here..."></textarea>

<div class="btn-row">
  <button id="grabPageBtn">📄 Grab Page Text</button>
  <button id="analyzeBtn">Analyze</button>
</div>

<div class="loading" id="loading">⏳ Analyzing...</div>
<div class="error-box" id="errorBox"></div>

<div id="result">
  <div class="result-label" id="resultLabel"></div>
  <div class="confidence-bar-wrap">
    <div class="confidence-bar" id="confidenceBar"></div>
  </div>
  <div id="confidenceText" style="font-size:12px;color:#aaa;"></div>
  <div class="result-message" id="resultMessage"></div>
</div>

<div class="footer">Powered by TF-IDF + BERT · Shashikant Nikam</div>

<script>
  const API = "https://fake-news-detection-rrs0.onrender.com/predict";

  document.getElementById("grabPageBtn").addEventListener("click", () => {
    chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
      chrome.scripting.executeScript({
        target: { tabId: tabs[0].id },
        func: () => document.body.innerText.slice(0, 3000)
      }, (results) => {
        if (results && results[0]) {
          document.getElementById("newsText").value = results[0].result;
        }
      });
    });
  });

  document.getElementById("analyzeBtn").addEventListener("click", async () => {
    const text = document.getElementById("newsText").value.trim();
    if (!text) return;

    // Reset UI
    document.getElementById("result").style.display    = "none";
    document.getElementById("errorBox").style.display  = "none";
    document.getElementById("loading").style.display   = "block";

    try {
      const response = await fetch(API, {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ text })
      });

      document.getElementById("loading").style.display = "none";

      if (!response.ok) throw new Error("Server error: " + response.status);

      const data = await response.json();
      showResult(data);
    } catch (err) {
      document.getElementById("loading").style.display  = "none";
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = "❌ Cannot reach the deployed API. Please try again.";
    }
  });

  function showResult(data) {
    const resultEl   = document.getElementById("result");
    const labelEl    = document.getElementById("resultLabel");
    const barEl      = document.getElementById("confidenceBar");
    const confTextEl = document.getElementById("confidenceText");
    const msgEl      = document.getElementById("resultMessage");

    const conf    = data.confidence;          // probability of being fake (0–1)
    const isFake  = data.label === "FAKE";
    const isUnsure= conf >= 0.35 && conf < 0.65;

    // Style result box
    resultEl.className = ""; // reset
    if (isUnsure) {
      resultEl.classList.add("result-unsure");
      labelEl.className  = "result-label unsure-color";
      labelEl.textContent = "⚠️ UNCERTAIN";
      barEl.className    = "confidence-bar bar-unsure";
    } else if (isFake) {
      resultEl.classList.add("result-fake");
      labelEl.className  = "result-label fake-color";
      labelEl.textContent = "🚨 LIKELY FAKE";
      barEl.className    = "confidence-bar bar-fake";
    } else {
      resultEl.classList.add("result-real");
      labelEl.className  = "result-label real-color";
      labelEl.textContent = "✅ LIKELY REAL";
      barEl.className    = "confidence-bar bar-real";
    }

    barEl.style.width   = `${Math.round(conf * 100)}%`;
    confTextEl.textContent = `Fake probability: ${Math.round(conf * 100)}%  |  Credibility: ${data.credibility}`;
    msgEl.textContent   = data.message;
    resultEl.style.display = "block";
  }
</script>
</body>
</html>
